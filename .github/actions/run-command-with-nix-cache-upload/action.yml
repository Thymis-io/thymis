name: "Run command with Nix cache upload"
inputs:
  script:
    description: "The script to run"
    required: true
  working-directory:
    description: "The working directory to run the script in"
    required: false
    default: "."
  exclude_result:
    description: "If 'true', exclude the ./result store path (and its outputs) from the cache upload. Useful for large build outputs like SD images."
    required: false
    default: "false"
  aws_access_key_id:
    description: "Hetzner S3 access key ID for cache upload."
    required: false
    default: ""
  aws_secret_access_key:
    description: "Hetzner S3 secret access key for cache upload."
    required: false
    default: ""
  signing_key:
    description: "Nix store signing key (cache.thymis.io-1:...) for cache upload."
    required: false
    default: ""
  github_token:
    description: "GitHub token (unused, accepted for compatibility)."
    required: false
    default: ""
runs:
  using: "composite"
  steps:
    - name: Snapshot store before build
      if: ${{ inputs.signing_key != '' }}
      shell: bash
      run: |
        nix path-info --all 2>/dev/null | sort > /tmp/nix-store-before.txt
    - name: Run script
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: ${{ inputs.script }}
    - if: ${{ inputs.signing_key != '' }}
      name: Upload new store paths to Nix cache
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        AWS_ACCESS_KEY_ID: ${{ inputs.aws_access_key_id }}
        AWS_SECRET_ACCESS_KEY: ${{ inputs.aws_secret_access_key }}
      run: |
        KEY_FILE=$(mktemp)
        trap 'rm -f "$KEY_FILE"' EXIT
        echo "${{ inputs.signing_key }}" > "$KEY_FILE"

        # Find all store paths added during this job
        nix path-info --all 2>/dev/null | sort > /tmp/nix-store-after.txt
        NEW_PATHS=$(comm -13 /tmp/nix-store-before.txt /tmp/nix-store-after.txt)

        if [ "${{ inputs.exclude_result }}" = "true" ] && [ -L ./result ]; then
          RESULT_PATH=$(readlink -f ./result)
          NEW_PATHS=$(echo "$NEW_PATHS" | grep -v "^${RESULT_PATH}$" || true)
        fi

        # Always exclude large/unnecessary paths from cache
        NEW_PATHS=$(echo "$NEW_PATHS" | grep -v "fill-image-with-secrets" | grep -v "\.img" | grep -v "nixos-vm" || true)

        # Exclude paths already available in upstream caches (cache.nixos.org or cache.thymis.io)
        if [ -n "$NEW_PATHS" ]; then
          UPSTREAM_SIGNED=$(echo "$NEW_PATHS" | xargs nix path-info --sigs 2>/dev/null \
            | grep -E "(cache\.nixos\.org-1:|cache\.thymis\.io-1:)" \
            | awk -F'\t' '{print $1}' | sort)
          if [ -n "$UPSTREAM_SIGNED" ]; then
            NEW_PATHS=$(comm -23 <(echo "$NEW_PATHS") <(echo "$UPSTREAM_SIGNED"))
          fi
        fi

        if [ -z "$NEW_PATHS" ]; then
          echo "No new store paths to upload."
          exit 0
        fi

        echo "Uploading $(echo "$NEW_PATHS" | wc -l) new store paths to cache..."
        echo "$NEW_PATHS" | xargs nix copy \
          --to "s3://thymis-nix-cache?endpoint=nbg1.your-objectstorage.com&region=nbg1&secret-key=${KEY_FILE}" \
          --no-check-sigs
