name: "Upload Nix Store Diff"
description: "Upload all store paths added since the last snapshot-nix-store step."
inputs:
  aws_access_key_id:
    description: "Hetzner S3 access key ID."
    required: true
  aws_secret_access_key:
    description: "Hetzner S3 secret access key."
    required: true
  signing_key:
    description: "Nix store signing key (cache.thymis.io-1:...)."
    required: true
runs:
  using: "composite"
  steps:
    - name: Upload new store paths to Nix cache
      shell: bash
      env:
        AWS_ACCESS_KEY_ID: ${{ inputs.aws_access_key_id }}
        AWS_SECRET_ACCESS_KEY: ${{ inputs.aws_secret_access_key }}
      run: |
        KEY_FILE=$(mktemp)
        trap 'rm -f "$KEY_FILE"' EXIT
        echo "${{ inputs.signing_key }}" > "$KEY_FILE"

        nix path-info --all 2>/dev/null | sort > /tmp/nix-store-after.txt
        NEW_PATHS=$(comm -13 /tmp/nix-store-before.txt /tmp/nix-store-after.txt)

        # Filter: exclude known-bad patterns and paths over 1 GB.
        # Everything else goes straight to nix copy — it checks the destination
        # narinfo before uploading, so already-cached paths are skipped
        # automatically without querying upstream caches first.
        MAX_SIZE=$((1024 * 1024 * 1024))
        _CAND=$(mktemp)
        trap 'rm -f "$KEY_FILE" "$_CAND"' EXIT
        echo "$NEW_PATHS" | while IFS= read -r path; do
          [ -z "$path" ] && continue
          echo "$path" | grep -qE '(fill-image-with-secrets|\.img$|nixos-vm)' && continue
          size=$(du -sb "$path" 2>/dev/null | awk '{print $1}')
          if [ -z "$size" ] || [ "$size" -ge "$MAX_SIZE" ]; then
            echo "Skipping $path (too large: ${size:-unknown} bytes)" >&2
            continue
          fi
          echo "$path" >> "$_CAND"
        done

        if [ ! -s "$_CAND" ]; then
          echo "No new store paths to upload."
          exit 0
        fi

        echo "Uploading $(wc -l < "$_CAND") new store paths to cache..."
        # Cache upload is best-effort: transient S3 errors must not fail the job.
        # nix copy checks the destination narinfo before uploading each path, so
        # already-cached paths are skipped automatically.
        # Run 4 parallel copy workers to saturate the link.
        xargs -a "$_CAND" -P 4 -n 64 nix copy \
          --to "s3://thymis-nix-cache?endpoint=nix-cache-s3.thymis.io&region=garage&secret-key=${KEY_FILE}" \
          --no-check-sigs \
          || echo "Warning: nix copy exited $? — transient S3 error likely; some paths may not have been cached. Non-fatal."
