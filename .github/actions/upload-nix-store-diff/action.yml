name: "Upload Nix Store Diff"
description: "Upload all store paths added since the last snapshot-nix-store step."
inputs:
  aws_access_key_id:
    description: "Hetzner S3 access key ID."
    required: true
  aws_secret_access_key:
    description: "Hetzner S3 secret access key."
    required: true
  signing_key:
    description: "Nix store signing key (cache.thymis.io-1:...)."
    required: true
  exclude_result:
    description: "If 'true', exclude the ./result store path from the upload. Useful for large build outputs like SD images."
    required: false
    default: "false"
runs:
  using: "composite"
  steps:
    - name: Upload new store paths to Nix cache
      shell: bash
      env:
        AWS_ACCESS_KEY_ID: ${{ inputs.aws_access_key_id }}
        AWS_SECRET_ACCESS_KEY: ${{ inputs.aws_secret_access_key }}
      run: |
        KEY_FILE=$(mktemp)
        _CAND=$(mktemp)
        trap 'rm -f "$KEY_FILE" "$_CAND"' EXIT
        echo "${{ inputs.signing_key }}" > "$KEY_FILE"

        nix path-info --all 2>/dev/null | sort > /tmp/nix-store-after.txt
        NEW_PATHS=$(comm -13 /tmp/nix-store-before.txt /tmp/nix-store-after.txt)

        if [ -z "$NEW_PATHS" ]; then
          echo "No new store paths to upload."
          exit 0
        fi

        # Build candidate list: filter by name pattern (and optional result
        # exclusion), then size-check all paths in one batched du pass.
        # The old serial per-path du loop was the main source of the ~10-30 s
        # collection hang when there were thousands of candidate paths.
        MAX_SIZE=$((1024 * 1024 * 1024))  # 1 GiB

        EXCL_RESULT=''
        if [ "${{ inputs.exclude_result }}" = "true" ] && [ -L ./result ]; then
          EXCL_RESULT=$(readlink -f ./result)
        fi

        printf '%s\n' "$NEW_PATHS" \
          | grep -vE '(fill-image-with-secrets|\.img$|nixos-vm)' \
          | { [ -n "$EXCL_RESULT" ] && grep -vxF "$EXCL_RESULT" || cat; } \
          | xargs -r du -sb 2>/dev/null \
          | awk -v max="$MAX_SIZE" '$1 < max { print $2 }' \
          > "$_CAND"

        if [ ! -s "$_CAND" ]; then
          echo "No new store paths to upload (all filtered out)."
          exit 0
        fi

        COUNT=$(wc -l < "$_CAND")
        echo "Uploading ${COUNT} new store paths to cache..."
        # nix copy checks the destination narinfo before uploading each path, so
        # already-cached paths are skipped automatically without any help from us.
        # Empirically, a single `nix copy` process is far slower overall than N
        # parallel processes (~2x slower with none) — whatever internally bounds
        # per-process copy/substitution concurrency, it's well below what N
        # external processes achieve, so we fan out via xargs -P despite the
        # redundant per-process closure computation this costs at startup.
        # Cache upload is best-effort: transient S3 errors must not fail the job.
        xargs -a "$_CAND" -P 16 -n 16 nix copy \
          --to "s3://thymis-nix-cache?endpoint=nix-cache-s3.thymis.io&region=garage&secret-key=${KEY_FILE}" \
          --no-check-sigs \
          || echo "Warning: nix copy exited $? — transient S3 error likely; some paths may not have been cached. Non-fatal."
